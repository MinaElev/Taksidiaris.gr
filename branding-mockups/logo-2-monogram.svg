<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 340" width="980" height="340">
  <!-- CONCEPT 2: Monogram Badge + Wordmark
       Στρογγυλό badge με στυλιζαρισμένο Τ όπου η οριζόντια κεραία
       γίνεται αεροπλάνο που απογειώνεται. -->

  <!-- Badge circle -->
  <circle cx="160" cy="170" r="115" fill="#0B2545"/>
  <circle cx="160" cy="170" r="103" fill="none" stroke="#E76F51" stroke-width="1.5" opacity="0.6"/>

  <!-- Stylized Τ monogram -->
  <g transform="translate(160, 170)">
    <!-- Vertical stroke of Τ -->
    <rect x="-11" y="-40" width="22" height="85" fill="#FFFFFF" rx="3"/>
    <!-- Horizontal bar / runway -->
    <rect x="-62" y="-50" width="105" height="20" fill="#FFFFFF" rx="4"/>

    <!-- Airplane lifting off the right edge of the bar -->
    <g transform="translate(52, -56) rotate(-28)">
      <path d="M 0 0 L 30 10 L 14 13 L 18 27 Z" fill="#E76F51"/>
    </g>

    <!-- Ascending dashed trail -->
    <path d="M 46 -48 Q 62 -62, 78 -80"
          stroke="#E76F51" stroke-width="2.5"
          fill="none" stroke-linecap="round"
          stroke-dasharray="2,5" opacity="0.85"/>
  </g>

  <!-- Wordmark right of badge -->
  <text x="320" y="165"
        font-family="'Segoe UI', 'Helvetica Neue', system-ui, sans-serif"
        font-weight="900" font-size="96" fill="#0B2545"
        letter-spacing="-3">Ταξιδιάρης</text>

  <!-- Subtagline -->
  <text x="322" y="215"
        font-family="'Segoe UI', system-ui, sans-serif"
        font-weight="500" font-size="22" fill="#E76F51"
        letter-spacing="4">ταξίδια  ·  οδηγοί  ·  εμπειρίες</text>

  <!-- .gr micro badge -->
  <g transform="translate(322, 245)">
    <rect x="0" y="0" width="52" height="22" rx="4" fill="#0B2545"/>
    <text x="26" y="16" text-anchor="middle"
          font-family="'Segoe UI', system-ui, sans-serif"
          font-weight="700" font-size="13" fill="#FFFFFF"
          letter-spacing="2">.GR</text>
  </g>
</svg>
